name: IndexNow Cron Scheduler

on:
  schedule:
    # Runs every 15 minutes. The Python script filters for the exact Vancouver time window.
    - cron: '*/15 * * * *' 
  workflow_dispatch: # Allows manual triggering for testing

jobs:
  run-cron:
    uses: ./.github/workflows/indexnow.yml
    with:
      trigger_mode: 'cron'
    secrets:
      INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}