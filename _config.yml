title: Paulo Cruz
title_separator: "|"
subtitle: The artifact of my crazy mind
logo: "/assets/icon88x88.png"
email: paulushc@gmail.com
description: >- # this means to ignore newlines until "baseurl:"
  Developer, Father, Board Game Player, that's the background

  Honestly, I'm a 30ish years old developer, who at a certain point in my life realized that software development is like Lego Bricks. I've always loved to build stuff with this bricks, and building software for me is 90% fun and 10% job.

  Coding for life. I love writing code, and as a developer, the world is an infinite source of inspiration. Every time I see some problem, I stop to think of a way to solve this problem with some kind of software, code or script. As a person, It's my responsibility to share all my knowledge with the world. This way, even if I die, my ideas will pass on.
  If you like to code, build plastic brick's towers and play some video and board games, just come with me on my magical journey through this big project called life.
baseurl: ""
url: "https://paulushcgcj.github.io/" 
github_username:  paulushcgcj
linkedin_username: paulushc
youtube_username: omundocruz

# Build settings
excerpt_separator: <!--more-->
show_excerpts: true

plugins:
  - jekyll-feed  
  - jekyll-gist
  - jekyll-seo-tag
  - jekyll-sitemap
  - kramdown-math-katex

kramdown:
  smart_quotes: ["lsquo", "rsquo", "ldquo", "rdquo"]
  math_engine: katex

exclude:
  - .devcontainer/
  - .vscode/
  - stitch_screens/
  - vendor/
  - node_modules/
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE

# Layout defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      author_profile: true
      show_date: true
      read_time: true
      share: false
      related: true
  - scope:
      path: ""
      type: pages
    values:
      layout: page
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: page