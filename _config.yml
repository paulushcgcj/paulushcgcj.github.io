title: Paulo Cruz
title_separator: "|"
subtitle: The artifact of my crazy mind
logo: "/assets/icon88x88.png"
email: paulushc@gmail.com
description: >- # this means to ignore newlines until "baseurl:"
  Developer, Father, Board Game Player, that's the background

  Honestly, I'm a 30ish years old developer, who at a certain point in my life realized that software development is like Lego Bricks. I've always loved to build stuff with this bricks, and building software for me is 90% fun and 10% job.

  Coding for life. I love writing code, and as a developer, the world is an infinite source of inspiration. Every time I see some problem, I stop to think of a way to solve this problem with some kind of software, code or script. As a person, It's my responsibility to share all my knowledge with the world. This way, even if I die, my ideas will pass on.
  If you like to code, build plastic brick's towers and play some video and board games, just come with me on my magical journey through this big project called life.
baseurl: ""
url: "https://paulushcgcj.github.io"
github_username:  paulushcgcj
linkedin_username: paulushc
youtube_username: omundocruz

# Build settings
excerpt_separator: <!--more-->
show_excerpts: true
future: false

include:
  - "BingSiteAuth.xml"
  - "8c3c5c9c-4c2c-4c0c-9c3c-2f6b7c4f9b21.txt"

plugins:
  - jekyll-feed
  - jekyll-target-blank
  - jekyll-seo-tag
  - jekyll-sitemap
  - liquid_pluralize
  - kramdown-math-katex
  - jekyll-compose
  - jekyll-archives
  - jekyll-paginate-v2
  - jekyll-scholar

kramdown:
  smart_quotes: ["lsquo", "rsquo", "ldquo", "rdquo"]
  math_engine: katex

exclude:
  - .devcontainer/
  - .vscode/
  - stitch_screens/
  - vendor/
  - node_modules/
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE

# Layout defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post

  - scope:
      path: ""
      type: pages
    values:
      layout: page
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: page

# jekyll-compose defaults
jekyll_compose:
  default_layout: post
  category: article
  author: paulushc
  license: CC-BY-4.0
  assets_dir: assets/posts
  publish_drafts: false
  scheduled_post: false
  default_date_format: "%Y-%m-%d %H:%M:%S %z"

# jekyll-archives
jekyll-archives:
  enabled:
    - tags
    - categories
  layouts:
    tag: archive
    category: archive
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/

# jekyll-paginate-v2
pagination:
  enabled: true
  per_page: 10
  permalink: "/page/:num/"
  title: ":title - page :num"
  sort_field: "date"
  sort_reverse: true

# jekyll-scholar
scholar:
  last_name: []
  first_name: []
  style: apa
  locale: en
  sort_by: author
  order: ascending
  bibliography: references
  bibliography_title: "References"
  replace_strings: true
  join_multiple_names: true
